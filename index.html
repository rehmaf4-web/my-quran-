<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allah's Rehma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#0f1628;--bg3:#141d35;--text:#e8dfc8;--text2:#8a9bb8;--accent:#7b9ccc;--border:rgba(123,156,204,0.18);--card:rgba(255,255,255,0.03);--arabic:#dde8f5;--shadow:0 8px 40px rgba(0,0,0,0.5);--nav-text:#0a0e1a;}
body.theme-gold{--bg:#1a1000;--bg2:#231800;--bg3:#2e2000;--text:#f5e6c0;--text2:#b8922a;--accent:#f0c040;--border:rgba(240,192,64,0.2);--card:rgba(255,255,255,0.03);--arabic:#fff8e0;--shadow:0 8px 40px rgba(0,0,0,0.6);--nav-text:#1a1000;}
body.theme-lilac{--bg:#f4eefb;--bg2:#ebe2f5;--bg3:#ddd1ec;--text:#2a1a3e;--text2:#7a5c9a;--accent:#8b5cf6;--border:rgba(139,92,246,0.2);--card:rgba(139,92,246,0.05);--arabic:#1e0d38;--shadow:0 8px 40px rgba(139,92,246,0.12);--nav-text:#f4eefb;}
body.theme-sage{--bg:#f1f5ef;--bg2:#e5ede1;--bg3:#d6e3d0;--text:#1e2e1a;--text2:#5a7a52;--accent:#4a7c59;--border:rgba(74,124,89,0.2);--card:rgba(74,124,89,0.05);--arabic:#0e1e0a;--shadow:0 8px 40px rgba(74,124,89,0.12);--nav-text:#f1f5ef;}
body.theme-butter{--bg:#fdf8e8;--bg2:#f7f0d0;--bg3:#efe6b8;--text:#2e2400;--text2:#8a7020;--accent:#b8860a;--border:rgba(184,134,10,0.2);--card:rgba(184,134,10,0.05);--arabic:#1a1000;--shadow:0 8px 40px rgba(184,134,10,0.12);--nav-text:#fdf8e8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;transition:background .4s,color .4s;}
#app{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
header{padding:.85rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);}
.logo{font-family:'Amiri',serif;font-size:1.65rem;color:var(--accent);line-height:1;}
.logo span{font-size:.7rem;color:var(--text2);display:block;font-family:'Cormorant Garamond',serif;letter-spacing:.25em;text-transform:uppercase;}
nav{display:flex;gap:.3rem;flex-wrap:wrap;}
nav button{background:none;border:1px solid var(--border);color:var(--text2);padding:.35rem .8rem;border-radius:2rem;cursor:pointer;font-family:inherit;font-size:.8rem;letter-spacing:.06em;transition:all .2s;}
nav button:hover,nav button.active{background:var(--accent);color:var(--nav-text);border-color:var(--accent);}

/* THEME MENU */
.theme-wrap{position:relative;}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.theme-btn:hover{border-color:var(--accent);}
.theme-drop{position:absolute;top:42px;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.5rem;z-index:500;display:none;min-width:160px;box-shadow:var(--shadow);}
.theme-drop.open{display:block;}
.theme-drop-title{font-size:.63rem;color:var(--text2);letter-spacing:.12em;text-transform:uppercase;padding:.3rem .6rem .5rem;border-bottom:1px solid var(--border);margin-bottom:.3rem;}
.theme-opt{display:flex;align-items:center;gap:.7rem;padding:.4rem .6rem;cursor:pointer;border-radius:6px;font-size:.82rem;color:var(--text);transition:background .15s;}
.theme-opt:hover{background:var(--card);}
.theme-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid transparent;}
.td-dark{background:#1a2540;border-color:#7b9ccc;}
.td-gold{background:#2e2000;border-color:#f0c040;}
.td-lilac{background:#c4a8e8;border-color:#8b5cf6;}
.td-sage{background:#b8d4ae;border-color:#4a7c59;}
.td-butter{background:#f5e88a;border-color:#b8860a;}

/* SIDEBAR */
main{display:flex;flex:1;}
aside{width:268px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 54px);position:sticky;top:54px;display:flex;flex-direction:column;transition:background .4s;}
.s-tabs{display:flex;border-bottom:1px solid var(--border);}
.s-tab{flex:1;padding:.5rem;text-align:center;cursor:pointer;font-family:inherit;font-size:.78rem;letter-spacing:.08em;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;transition:all .2s;}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.s-search{padding:.6rem;background:var(--bg2);border-bottom:1px solid var(--border);}
.s-search input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.42rem .7rem;border-radius:6px;font-family:inherit;font-size:.83rem;outline:none;}
.s-search input:focus{border-color:var(--accent);}
.s-search input::placeholder{color:var(--text2);}
.s-list{list-style:none;overflow-y:auto;flex:1;}
.si{display:flex;align-items:center;gap:.6rem;padding:.58rem .85rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.si:hover{background:var(--card);}
.si.active{background:rgba(123,156,204,0.08);border-left:3px solid var(--accent);}
.sn{width:25px;height:25px;background:var(--bg3);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.64rem;color:var(--accent);flex-shrink:0;}
.si-info{flex:1;min-width:0;}
.si-name{font-size:.85rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-meta{font-size:.67rem;color:var(--text2);}
.si-ar{font-family:'Amiri',serif;font-size:.95rem;color:var(--accent);flex-shrink:0;}
.ji{display:flex;align-items:center;gap:.65rem;padding:.6rem .85rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.ji:hover{background:var(--card);}
.ji.active{background:rgba(123,156,204,0.08);border-left:3px solid var(--accent);}
.jn{width:34px;height:34px;background:var(--accent);color:var(--nav-text);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;}
.j-lbl{font-size:.85rem;color:var(--text);font-weight:600;}
.j-sub{font-size:.66rem;color:var(--text2);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:2rem 2.5rem;max-width:870px;margin:0 auto;width:100%;}
.sh{text-align:center;margin-bottom:1.8rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.sh-ar{font-family:'Amiri',serif;font-size:2.7rem;color:var(--arabic);line-height:1.4;}
.sh-en{font-size:1.35rem;font-weight:300;color:var(--text);letter-spacing:.1em;margin-top:.3rem;}
.sh-d{font-size:.78rem;color:var(--text2);margin-top:.35rem;letter-spacing:.12em;text-transform:uppercase;}
.bismillah{font-family:'Amiri',serif;font-size:1.9rem;color:var(--accent);text-align:center;margin:1.2rem 0 .4rem;direction:rtl;}
.juz-hdr{display:flex;align-items:center;gap:.9rem;margin:1.8rem 0 .8rem;padding:.75rem 1.1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.juz-badge{width:40px;height:40px;background:var(--accent);color:var(--nav-text);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;}
.juz-hdr-t{font-size:.95rem;color:var(--accent);font-weight:600;}
.juz-hdr-s{font-size:.75rem;color:var(--text2);}

/* AYAH CARD */
.ac{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1.5rem 1.5rem 1.3rem;margin-bottom:.9rem;position:relative;transition:box-shadow .2s,border-color .3s;}
.ac:hover{box-shadow:var(--shadow);}
.ac.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow);}
.an{position:absolute;top:1rem;left:1rem;width:28px;height:28px;background:var(--bg3);border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;color:var(--accent);}
.aref{position:absolute;top:1rem;right:1rem;font-size:.66rem;color:var(--text2);letter-spacing:.04em;}
.aa{font-family:'Amiri',serif;font-size:1.8rem;line-height:2.1;text-align:right;direction:rtl;color:var(--arabic);padding-top:.2rem;}
.adiv{width:34px;height:1px;background:var(--border);margin:.75rem 0;}
.at{font-style:italic;font-size:.88rem;color:var(--text2);line-height:1.7;border-left:2px solid var(--border);padding-left:.7rem;}
.atr{font-size:.95rem;line-height:1.8;color:var(--text);margin-top:.65rem;}

/* AUDIO BAR */
.audio-bar{display:flex;align-items:center;gap:.55rem;margin-top:1rem;padding-top:.75rem;border-top:1px solid var(--border);}
.play-btn{width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--nav-text);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:transform .15s;}
.play-btn:hover{transform:scale(1.08);}
.audio-prog-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer;}
.audio-prog-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .15s linear;}
.audio-time{font-size:.65rem;color:var(--text2);min-width:55px;text-align:right;}

/* GLOBAL PLAYER */
#gplayer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:.6rem 1.2rem;display:none;align-items:center;gap:.8rem;z-index:300;backdrop-filter:blur(16px);}
#gplayer.on{display:flex;}
.gp-info{flex:1;min-width:0;}
.gp-title{font-size:.78rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gp-sub{font-size:.65rem;color:var(--text2);}
.gp-ctrl{display:flex;gap:.4rem;align-items:center;}
.gp-btn{background:none;border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .15s;}
.gp-btn:hover{border-color:var(--accent);color:var(--accent);}
.gp-btn.pri{background:var(--accent);color:var(--nav-text);border-color:var(--accent);}
.gp-pw{width:130px;height:4px;background:var(--border);border-radius:2px;cursor:pointer;}
.gp-pf{height:100%;background:var(--accent);border-radius:2px;width:0%;}
.gp-time{font-size:.65rem;color:var(--text2);white-space:nowrap;}

/* MISC */
.loading{text-align:center;padding:4rem 2rem;color:var(--text2);font-size:1.05rem;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:.7rem;padding:.4rem 0;}
.nc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.95rem;text-align:center;transition:box-shadow .2s,transform .2s;}
.nc:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.nn{font-size:.63rem;color:var(--text2);margin-bottom:.2rem;letter-spacing:.1em;}
.nar{font-family:'Amiri',serif;font-size:1.4rem;color:var(--accent);direction:rtl;}
.ntr{font-size:.73rem;font-style:italic;color:var(--text2);margin-top:.12rem;}
.nm{font-size:.8rem;color:var(--text);margin-top:.22rem;}
.dc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1.5rem;margin-bottom:.9rem;}
.dt{font-size:.95rem;font-weight:600;color:var(--accent);margin-bottom:.8rem;}
.dar{font-family:'Amiri',serif;font-size:1.5rem;direction:rtl;text-align:right;color:var(--arabic);line-height:2;}
.dtr{font-style:italic;font-size:.86rem;color:var(--text2);margin-top:.7rem;line-height:1.7;border-left:2px solid var(--border);padding-left:.7rem;}
.den{font-size:.91rem;color:var(--text);margin-top:.6rem;line-height:1.75;}
.pt{font-family:'Amiri',serif;font-size:1.9rem;color:var(--accent);margin-bottom:.22rem;}
.ps{font-size:.88rem;color:var(--text2);margin-bottom:1.6rem;letter-spacing:.1em;}
.orn{text-align:center;color:var(--accent);font-size:.95rem;margin:.7rem 0;opacity:.4;}

/* PRAYER TRACKER */
.prayer-grid{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.5rem;}
.prayer-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1rem 1.2rem;transition:border-color .2s,background .2s;}
.prayer-row.done{border-color:var(--accent);background:rgba(123,156,204,0.07);}
.prayer-name .pen{font-size:1rem;font-weight:600;color:var(--text);}
.prayer-name .par{font-family:'Amiri',serif;font-size:1.1rem;color:var(--accent);}
.pcheck{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;font-size:1rem;color:transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.pcheck:hover{border-color:var(--accent);}
.prayer-row.done .pcheck{background:var(--accent);border-color:var(--accent);color:var(--nav-text);}
.prayer-summary{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1.2rem;text-align:center;margin-bottom:.8rem;}
.p-count{font-size:2.5rem;font-weight:600;color:var(--accent);line-height:1;}
.p-count-lbl{font-size:.75rem;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-top:.3rem;}
.p-reset{margin-top:.9rem;background:none;border:1px solid var(--border);color:var(--text2);padding:.38rem 1rem;border-radius:2rem;cursor:pointer;font-family:inherit;font-size:.78rem;transition:all .2s;}
.p-reset:hover{border-color:var(--accent);color:var(--accent);}
.prayer-streak{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1rem;text-align:center;}
.streak-n{font-size:1.8rem;color:var(--accent);font-weight:600;}
.streak-l{font-size:.72rem;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;}
.prayer-date{text-align:center;font-size:.78rem;color:var(--text2);letter-spacing:.1em;margin-bottom:1.2rem;}

.mtgl{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:.32rem .6rem;border-radius:6px;cursor:pointer;font-size:.95rem;}
@media(max-width:700px){
  aside{display:none;}
  .mtgl{display:flex!important;}
  aside.open{display:flex;position:fixed;inset:54px 0 0;z-index:200;width:100%;}
  .content{padding:1.2rem 1rem;}
  .gp-pw{width:70px;}
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,156,204,0.4);}70%{box-shadow:0 0 0 6px rgba(123,156,204,0);}100%{box-shadow:0 0 0 0 rgba(123,156,204,0);}}
.play-btn.active{animation:pulse 1.4s ease-out infinite;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:.8rem">
      <button class="mtgl" onclick="toggleMenu()">☰</button>
      <div class="logo">رَحْمَة <span>Allah's Rehma · His Mercy</span></div>
    </div>
    <nav>
      <button class="active" onclick="showSec('quran',this)">Quran</button>
      <button onclick="showSec('asma',this)">Asma ul Husna</button>
      <button onclick="showSec('duas',this)">Daily Duas</button>
      <button onclick="showSec('prayer',this)">Prayer Tracker</button>
    </nav>
    <div class="theme-wrap">
      <button class="theme-btn" onclick="toggleThemeDrop()">🎨</button>
      <div class="theme-drop" id="tdrop">
        <div class="theme-drop-title">Choose Theme</div>
        <div class="theme-opt" onclick="setTheme('','td-dark')"><span class="theme-dot td-dark"></span>Night</div>
        <div class="theme-opt" onclick="setTheme('gold','td-gold')"><span class="theme-dot td-gold"></span>Gold</div>
        <div class="theme-opt" onclick="setTheme('lilac','td-lilac')"><span class="theme-dot td-lilac"></span>Lilac</div>
        <div class="theme-opt" onclick="setTheme('sage','td-sage')"><span class="theme-dot td-sage"></span>Sage Green</div>
        <div class="theme-opt" onclick="setTheme('butter','td-butter')"><span class="theme-dot td-butter"></span>Butter</div>
      </div>
    </div>
  </header>
  <main>
    <aside id="sidebar">
      <div class="s-tabs">
        <button class="s-tab active" id="tab-s" onclick="switchTab('surah')">By Surah</button>
        <button class="s-tab" id="tab-j" onclick="switchTab('juz')">By Juz</button>
      </div>
      <div class="s-search"><input type="text" id="srch" placeholder="Search surah..." oninput="doSearch(this.value)"></div>
      <ul class="s-list" id="slist"></ul>
    </aside>
    <div class="content" id="content"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </main>
</div>

<div id="gplayer">
  <div class="gp-info">
    <div class="gp-title" id="gp-title">—</div>
    <div class="gp-sub">Muhammad Al-Luhaidan</div>
  </div>
  <div class="gp-ctrl">
    <button class="gp-btn" onclick="audioNav(-1)">&#9664;</button>
    <button class="gp-btn pri" id="gp-pp" onclick="toggleGP()">&#9654;</button>
    <button class="gp-btn" onclick="audioNav(1)">&#9654;&#9654;</button>
  </div>
  <div class="gp-pw" onclick="seekGP(event)"><div class="gp-pf" id="gp-pf"></div></div>
  <div class="gp-time" id="gp-time">0:00</div>
  <button class="gp-btn" onclick="stopAudio()" style="font-size:.65rem">✕</button>
</div>

<audio id="aud"></audio>

let sec='quran', curS=1, curJ=1, tab='surah', cache={}, filtered=[...SM];
const aud = document.getElementById('aud');

const audioCache = {};

// ── Theme ─────────────────────────────────────────────────────
function setTheme(cls) {
  document.body.className = cls ? 'theme-'+cls : '';
  document.getElementById('tdrop').classList.remove('open');
}
function toggleThemeDrop() {
  document.getElementById('tdrop').classList.toggle('open');
}
document.addEventListener('click', e => {
  const d = document.getElementById('tdrop');
  if (!d.contains(e.target) && !e.target.closest('.theme-btn')) d.classList.remove('open');
});

// ── Nav ───────────────────────────────────────────────────────
function toggleMenu(){ document.getElementById('sidebar').classList.toggle('open'); }
function showSec(s, btn) {
  sec = s;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (s==='quran') { tab==='surah' ? renderS(curS) : renderJ(curJ); }
  else if (s==='asma') renderAsma();
  else if (s==='duas') renderDuas();
  else if (s==='prayer') renderPrayer();
}
function switchTab(t) {
  tab = t;
  document.getElementById('tab-s').classList.toggle('active', t==='surah');
  document.getElementById('tab-j').classList.toggle('active', t==='juz');
  document.getElementById('srch').value = '';
  filtered = [...SM];
  buildList();
}
function doSearch(q) {
  if (tab !== 'surah') return;
  const t = q.toLowerCase();
  filtered = t ? SM.filter(s => s[1].toLowerCase().includes(t)||s[3].toLowerCase().includes(t)||String(s[0]).includes(t)) : [...SM];
  buildList();
}
function buildList() {
  const ul = document.getElementById('slist');
  if (tab==='surah') {
    ul.innerHTML = filtered.map(s=>`<li class="si${s[0]===curS?' active':''}" onclick="loadS(${s[0]})"><div class="sn">${s[0]}</div><div class="si-info"><div class="si-name">${s[1]}</div><div class="si-meta">${s[3]} · ${s[4]} · ${s[5]} ayahs</div></div><div class="si-ar">${s[2]}</div></li>`).join('');
  } else {
    ul.innerHTML = JD.map(j=>`<li class="ji${j[0]===curJ?' active':''}" onclick="loadJ(${j[0]})"><div class="jn">J${j[0]}</div><div><div class="j-lbl">${j[1]}</div><div class="j-sub">${j[2]}</div></div></li>`).join('');
  }
}
function loadS(n){ curS=n; buildList(); document.getElementById('sidebar').classList.remove('open'); renderS(n); }
function loadJ(n){ curJ=n; buildList(); document.getElementById('sidebar').classList.remove('open'); renderJ(n); }

// ── Data fetch ────────────────────────────────────────────────
async function fetchS(n) {
  if (cache[n]) return cache[n];
  const [a,e,t] = await Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${n}`),
    fetch(`https://api.alquran.cloud/v1/surah/${n}/en.sahih`),
    fetch(`https://api.alquran.cloud/v1/surah/${n}/en.transliteration`)
  ]);
  const [ar,en,tr] = await Promise.all([a.json(), e.json(), t.json()]);
  cache[n] = {ar:ar.data, en:en.data, tr:tr.data};
  return cache[n];
}

async function fetchAudio(surahNum) {
  if (audioCache[surahNum]) return audioCache[surahNum];
  // Try Muhammad Al-Luhaidan, fallback to Abdul Basit
  const editions = ['ar.muhammadluhaidan', 'ar.abdulbasitmurattal'];
  for (const ed of editions) {
    try {
      const r = await fetch(`https://api.alquran.cloud/v1/surah/${surahNum}/${ed}`);
      const d = await r.json();
      if (d.data && d.data.ayahs && d.data.ayahs[0] && d.data.ayahs[0].audio) {
        audioCache[surahNum] = { urls: d.data.ayahs.map(a => a.audio), edition: ed };
        return audioCache[surahNum];
      }
    } catch(e) {}
  }
  return null;
}

// ── Audio ─────────────────────────────────────────────────────
async function playAyah(surahNum, idx, count) {
  aud.pause();
  clearHL();
  AS = { surah: surahNum, idx, count };
  highlightAyah(idx);
  updateBtns();
  updateGP();

  const result = await fetchAudio(surahNum);
  if (!result || !result.urls[idx]) return;
  if (AS.surah !== surahNum || AS.idx !== idx) return; // stale

  aud.src = result.urls[idx];
  aud.load();
  aud.play().catch(err => console.warn('Audio error:', err));
}

function toggleGP() {
  if (!AS.surah) return;
  if (aud.paused) aud.play();
  else aud.pause();
}

function stopAudio() {
  aud.pause(); aud.src = '';
  AS = { surah:null, idx:null, count:0 };
  clearHL(); updateBtns();
  document.getElementById('gplayer').classList.remove('on');
}

function audioNav(dir) {
  if (!AS.surah) return;
  const next = AS.idx + dir;
  if (next < 0 || next >= AS.count) return;
  playAyah(AS.surah, next, AS.count);
  setTimeout(() => {
    const card = document.querySelector(`.ac[data-i="${next}"]`);
    if (card) card.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function clearHL() { document.querySelectorAll('.ac.playing').forEach(c => c.classList.remove('playing')); }
function highlightAyah(idx) {
  clearHL();
  const card = document.querySelector(`.ac[data-i="${idx}"]`);
  if (card) card.classList.add('playing');
}
function updateBtns() {
  document.querySelectorAll('.play-btn').forEach(btn => {
    const i = parseInt(btn.dataset.i), s = parseInt(btn.dataset.s);
    const isThis = s===AS.surah && i===AS.idx;
    btn.classList.toggle('active', isThis && !aud.paused);
    btn.innerHTML = (isThis && !aud.paused) ? '⏸' : '▶';
  });
}
function updateGP() {
  const gp = document.getElementById('gplayer');
  if (!AS.surah) { gp.classList.remove('on'); return; }
  gp.classList.add('on');
  const m = SM[AS.surah-1];
  document.getElementById('gp-title').textContent = `${m[1]} · Ayah ${AS.idx+1}`;
  document.getElementById('gp-pp').innerHTML = aud.paused ? '▶' : '⏸';
}
function seekGP(e) {
  if (!aud.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration;
}
function seekInline(e, idx) {
  if (AS.idx !== idx || !aud.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration;
}
function fmt(s) { if (!s||isNaN(s)) return '0:00'; return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0'); }

function onPlayBtn(s, i) {
  if (AS.surah===s && AS.idx===i && !aud.paused) { aud.pause(); updateBtns(); updateGP(); }
  else playAyah(s, i, SM[s-1][5]);
}

aud.addEventListener('timeupdate', () => {
  if (!aud.duration) return;
  const pct = (aud.currentTime/aud.duration*100).toFixed(1)+'%';
  document.getElementById('gp-pf').style.width = pct;
  document.getElementById('gp-time').textContent = fmt(aud.currentTime)+' / '+fmt(aud.duration);
  const pf = document.querySelector(`.audio-prog-fill[data-i="${AS.idx}"]`);
  if (pf) pf.style.width = pct;
  const pt = document.querySelector(`.audio-time[data-i="${AS.idx}"]`);
  if (pt) pt.textContent = fmt(aud.currentTime)+' / '+fmt(aud.duration);
});
aud.addEventListener('ended', () => {
  const next = AS.idx + 1;
  if (next < AS.count) {
    setTimeout(() => {
      playAyah(AS.surah, next, AS.count);
      const card = document.querySelector(`.ac[data-i="${next}"]`);
      if (card) card.scrollIntoView({behavior:'smooth', block:'center'});
    }, 300);
  } else { clearHL(); updateBtns(); updateGP(); }
});
aud.addEventListener('play', () => { document.getElementById('gp-pp').innerHTML='⏸'; updateBtns(); });
aud.addEventListener('pause', () => { document.getElementById('gp-pp').innerHTML='▶'; updateBtns(); });

function audioBar(s, i) {
  return `<div class="audio-bar">
    <button class="play-btn" data-s="${s}" data-i="${i}" onclick="onPlayBtn(${s},${i})">▶</button>
    <div class="audio-prog-wrap" onclick="seekInline(event,${i})">
      <div class="audio-prog-fill" data-i="${i}" style="width:0%"></div>
    </div>
    <div class="audio-time" data-i="${i}">0:00</div>
  </div>`;
}

// ── Render Quran ──────────────────────────────────────────────
async function renderS(n) {
  const c = document.getElementById('content'), m = SM[n-1];
  c.innerHTML = `<div class="loading"><div class="spinner"></div>Loading ${m[1]}...</div>`;
  try {
    const d = await fetchS(n);
    const bism = n!==1 && n!==9;
    let h = `<div class="sh"><div class="sh-ar">${m[2]}</div><div class="sh-en">${m[1]} · ${m[3]}</div><div class="sh-d">${m[4]} · ${m[5]} Ayahs · Juz ${m[6]}</div></div>
    ${bism?'<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>':''}<div class="orn">— ✦ —</div>`;
    d.ar.ayahs.forEach((ay,i) => {
      h += `<div class="ac" data-i="${i}">
        <div class="an">${ay.numberInSurah}</div>
        <div class="aa">${ay.text}</div>
        <div class="adiv"></div>
        <div class="at">${d.tr.ayahs[i]?.text||''}</div>
        <div class="atr">${d.en.ayahs[i]?.text||''}</div>
        ${audioBar(n,i)}
      </div>`;
    });
    c.innerHTML = h; c.scrollTo(0,0);
    if (AS.surah===n) { highlightAyah(AS.idx); updateBtns(); }
  } catch(e) { c.innerHTML=`<div class="loading"><p style="color:var(--accent)">Unable to load. Check your internet connection.</p></div>`; }
}

async function renderJ(jn) {
  const c = document.getElementById('content'), j = JD[jn-1];
  c.innerHTML = `<div class="loading"><div class="spinner"></div>Loading ${j[1]}...</div>`;
  try {
    const all = await Promise.all(Array.from({length:j[4]-j[3]+1},(_,i)=>fetchS(j[3]+i)));
    let h = `<div class="sh"><div class="sh-en" style="font-size:1.9rem">${j[1]}</div><div class="sh-d">${j[2]}</div></div>`;
    all.forEach((d,i) => {
      const sn=j[3]+i, m=SM[sn-1], bism=sn!==1&&sn!==9;
      h += `<div class="juz-hdr"><div class="juz-badge">${sn}</div><div><div class="juz-hdr-t">${m[1]} · ${m[2]}</div><div class="juz-hdr-s">${m[3]} · ${m[4]} · ${m[5]} ayahs</div></div></div>
      ${bism?'<div class="bismillah" style="font-size:1.5rem;margin:.8rem 0">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>':''}`;
      d.ar.ayahs.forEach((ay,i2) => {
        h += `<div class="ac" data-i="${i2}">
          <div class="an">${ay.numberInSurah}</div>
          <div class="aref">${m[1]}</div>
          <div class="aa">${ay.text}</div>
          <div class="adiv"></div>
          <div class="at">${d.tr.ayahs[i2]?.text||''}</div>
          <div class="atr">${d.en.ayahs[i2]?.text||''}</div>
          ${audioBar(sn,i2)}
        </div>`;
      });
    });
    c.innerHTML = h; c.scrollTo(0,0);
  } catch(e) { c.innerHTML=`<div class="loading"><p style="color:var(--accent)">Unable to load. Check your internet connection.</p></div>`; }
}

// ── Render Asma ───────────────────────────────────────────────
function renderAsma() {
  document.getElementById('content').innerHTML =
    `<div class="pt">أسماء الله الحسنى</div><div class="ps">The 99 Beautiful Names of Allah</div>
    <div class="ng">${ASMA.map(n=>`<div class="nc"><div class="nn">${n[0]}</div><div class="nar">${n[1]}</div><div class="ntr">${n[2]}</div><div class="nm">${n[3]}</div></div>`).join('')}</div>`;
}

// ── Render Duas ───────────────────────────────────────────────
function renderDuas() {
  document.getElementById('content').innerHTML =
    `<div class="pt">الأدعية اليومية</div><div class="ps">Essential Daily Duas</div>
    ${DUAS.map(d=>`<div class="dc"><div class="dt">${d.title}</div><div class="dar">${d.arabic}</div><div class="dtr">${d.transliteration}</div><div class="den">${d.translation}</div></div>`).join('')}`;
}

// ── Prayer Tracker ────────────────────────────────────────────
const PRAYERS = [
  {en:'Fajr',ar:'الفجر'},{en:'Dhuhr',ar:'الظهر'},
  {en:'Asr',ar:'العصر'},{en:'Maghrib',ar:'المغرب'},{en:'Isha',ar:'العشاء'}
];
function todayKey() { return 'pr_'+new Date().toISOString().slice(0,10); }
function getPState() { try { return JSON.parse(localStorage.getItem(todayKey())||'{}'); } catch(e) { return {}; } }
function setPState(s) {
  localStorage.setItem(todayKey(), JSON.stringify(s));
  const all5 = Object.values(s).filter(Boolean).length === 5;
  if (all5) {
    const today = new Date().toISOString().slice(0,10);
    const last = localStorage.getItem('streak_day');
    const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
    let streak = parseInt(localStorage.getItem('streak')||'0');
    if (last !== today) {
      streak = (last===yest) ? streak+1 : 1;
      localStorage.setItem('streak', streak);
      localStorage.setItem('streak_day', today);
    }
  }
}
function togglePrayer(name) {
  const s = getPState(); s[name] = !s[name]; setPState(s); renderPrayer();
}
function resetPrayers() { localStorage.removeItem(todayKey()); renderPrayer(); }
function renderPrayer() {
  const s = getPState();
  const done = Object.values(s).filter(Boolean).length;
  const streak = parseInt(localStorage.getItem('streak')||'0');
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('content').innerHTML = `
    <div class="pt">الصلاة</div>
    <div class="ps">Daily Prayer Tracker</div>
    <div class="prayer-date">${today}</div>
    <div class="prayer-grid">
      ${PRAYERS.map(p=>`
        <div class="prayer-row${s[p.en]?' done':''}">
          <div class="prayer-name"><div class="pen">${p.en}</div><div class="par">${p.ar}</div></div>
          <button class="pcheck" onclick="togglePrayer('${p.en}')">✓</button>
        </div>`).join('')}
    </div>
    <div class="prayer-summary">
      <div class="p-count">${done} / 5</div>
      <div class="p-count-lbl">Prayers Completed Today</div>
      <button class="p-reset" onclick="resetPrayers()">Reset Today</button>
    </div>
    <div class="prayer-streak">
      <div class="streak-n">🔥 ${streak}</div>
      <div class="streak-l">Day Streak — All 5 Prayers</div>
    </div>`;
}

buildList();
renderS(1);
